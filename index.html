<!DOCTYPE html>
<html lang="nl" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <title>Streamgids</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="StreamGids" />
  <meta name="theme-color" content="#f2f2f7" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Jost:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script>
    /* Auto theme: inherit device preference, allow override */
    (function(){
      try {
        var saved = localStorage.getItem('streamgids_theme');
        if (saved === 'dark' || saved === 'light') {
          document.documentElement.setAttribute('data-theme', saved);
        } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
          document.documentElement.setAttribute('data-theme', 'dark');
        } else {
          document.documentElement.setAttribute('data-theme', 'light');
        }
      } catch(e) {
        document.documentElement.setAttribute('data-theme', 'light');
      }
    })();
  </script>
</head>
<body>

<div class="app">
  <header class="top-header">
    <div class="header-left">
      <div class="brand-wrap">
        <span class="brand-name">Stream<strong>gids</strong></span>
        <span class="brand-nl">NL</span>
      </div>
    </div>
    <button class="header-icon-btn" id="themeBtn" aria-label="Thema wisselen">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
    </button>
  </header>

  <div class="slogan-bar">
    <div class="slogan">Alles wat verschijnt op streaming op een plek.</div>
  </div>

  <div class="date-tabs" id="dateTabs"></div>
  <div class="svc-bar" id="svcBar"></div>

  <main id="main">
    <div class="loading-screen">
      <div class="ld-spinner"></div>
      <div class="ld-text" id="loadText">Laden...</div>
      <div class="ld-sub" id="loadSub"></div>
    </div>
  </main>
</div>

<nav class="bottom-nav" id="bottomNav">
  <button class="bnav active" data-f="all">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
    <span>Alles</span>
  </button>
  <button class="bnav" data-f="movie">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2" y="2" width="20" height="20" rx="2"/><line x1="7" y1="2" x2="7" y2="22"/><line x1="17" y1="2" x2="17" y2="22"/><line x1="2" y1="12" x2="22" y2="12"/></svg>
    <span>Films</span>
  </button>
  <button class="bnav" data-f="tv">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2" y="7" width="20" height="15" rx="2"/><polyline points="17 2 12 7 7 2"/></svg>
    <span>Series</span>
  </button>
  <button class="bnav" data-f="top10">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
    <span>Top 10</span>
  </button>
  <button class="bnav" data-f="livesport">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8" fill="currentColor" stroke="none"/></svg>
    <span>Sport</span>
  </button>
  <button class="bnav" data-f="search">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <span>Zoeken</span>
  </button>
</nav>

<div id="overlay">
  <div class="sheet" id="sheetEl">
    <div class="sheet-top-row">
      <div class="drag"></div>
      <button class="sheet-close" id="sheetClose" aria-label="Sluiten">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div id="si"></div>
    <div id="sd" class="sheet-body"></div>
    <div id="ratingsRow" class="ratings-row"></div>
    <a id="wb" class="watch-btn" href="#" target="_blank" rel="noopener noreferrer" style="display:none">
      <img id="wbLogo" src="" alt="" style="width:22px;height:22px;border-radius:5px;object-fit:cover;display:none" onerror="this.style.display='none'">
      <span id="wbLabel">Kijken</span>
    </a>
    <button id="shareBtn" class="share-btn" style="display:none">Delen</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
