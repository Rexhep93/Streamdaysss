<!DOCTYPE html>

<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <title>Streamgids</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="StreamGids" />
  <meta name="theme-color" content="#111114" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 200'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%231a2240'/%3E%3Cstop offset='100%25' stop-color='%230d1525'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='200' height='200' rx='42' fill='url(%23g)'/%3E%3Crect x='136' y='24' width='32' height='32' rx='6' fill='%23E8001A'/%3E%3Ctext x='100' y='116' text-anchor='middle' dominant-baseline='middle' font-family='-apple-system,BlinkMacSystemFont,%22SF Pro Display%22,%22Helvetica Neue%22,Arial,sans-serif' font-size='118' font-weight='800' fill='white' letter-spacing='-6'%3ESG%3C/text%3E%3C/svg%3E" />
  <link rel="stylesheet" href="style.css">
  <script>
    (function() {
      const saved = localStorage.getItem('streamgids_theme') || 'dark';
      if (saved === 'light') document.documentElement.dataset.theme = 'light';
    })();
  </script>
</head>
<body>

<!-- ── Top Header ── -->

<header class="top-header">
  <div class="header-logo">
    <svg width="28" height="28" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" style="stop-color:#1a2240"/>
          <stop offset="100%" style="stop-color:#0d1525"/>
        </linearGradient>
      </defs>
      <rect width="200" height="200" rx="42" fill="url(#bgGrad)"/>
      <rect x="138" y="26" width="30" height="30" rx="6" fill="#E8001A"/>
      <text x="100" y="116" text-anchor="middle" dominant-baseline="middle"
            font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue',Arial,sans-serif"
            font-size="120" font-weight="800" fill="white" letter-spacing="-6">SG</text>
    </svg>
    <div class="header-title">
      <span class="ht-stream">Stream</span><span class="ht-gids">gids</span><span class="ht-nl">NL</span>
    </div>
  </div>
  <div class="header-right">
    <button class="hdr-btn" onclick="toggleTheme()" aria-label="Wissel thema">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
      </svg>
    </button>
    <button class="hdr-btn" onclick="toggleSearch()" aria-label="Zoeken">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
    </button>
  </div>
</header>

<!-- ── Search bar (hidden by default) ── -->

<div class="search-wrap" id="searchWrap" style="display:none">
  <input type="search" id="searchInput" class="search-input" placeholder="Zoek films & series…" oninput="onSearch(this.value)" autocomplete="off" />
</div>

<!-- ── Date tabs ── -->

<div class="date-strip-wrap" id="dateStripWrap">
  <div class="date-strip" id="dateStrip"></div>
</div>

<!-- ── Streamer filter strip (compact) ── -->

<div class="svc-strip-wrap" id="svcStripWrap">
  <div class="svc-strip" id="svcStrip"></div>
</div>

<!-- ── Main content ── -->

<main id="main" class="main-content">
  <div class="loading-screen">
    <div class="spinner"></div>
    <div class="loading-text">Releases laden…</div>
    <div class="loading-sub" id="loadSub"></div>
  </div>
</main>

<!-- ── Bottom Navigation ── -->

<nav class="bottom-nav" role="navigation" aria-label="Hoofdnavigatie">
  <button class="bnav-item active" data-f="all" onclick="setType(this)">
    <svg class="bnav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
      <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
    </svg>
    <span>Alles</span>
  </button>
  <button class="bnav-item" data-f="movie" onclick="setType(this)">
    <svg class="bnav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <rect x="2" y="4" width="20" height="16" rx="2"/><path d="m10 8 6 4-6 4V8z" fill="currentColor" stroke="none"/>
    </svg>
    <span>Films</span>
  </button>
  <button class="bnav-item" data-f="tv" onclick="setType(this)">
    <svg class="bnav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <rect x="2" y="7" width="20" height="14" rx="2"/><path d="m8 7 4-4 4 4"/>
    </svg>
    <span>Series</span>
  </button>
  <button class="bnav-item" data-f="top10" onclick="setType(this)">
    <svg class="bnav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
    </svg>
    <span>Top 10</span>
  </button>
  <button class="bnav-item" data-f="livesport" onclick="setType(this)">
    <svg class="bnav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="10"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/><path d="M2 12h20"/>
    </svg>
    <span>Live Sport</span>
  </button>
</nav>

<!-- ── Modal overlay ── -->

<div id="overlay" onclick="closeBg(event)" role="dialog" aria-modal="true">
  <div class="sheet">
    <div class="drag-handle"></div>
    <div id="si" class="sheet-top"></div>
    <div id="sd" class="sheet-desc"></div>
    <div id="ratingsRow" class="ratings-row" style="display:none"></div>
    <a id="wb" class="watch-btn" href="#" target="_blank" rel="noopener noreferrer" style="display:none">
      <img id="wbLogo" src="" alt="" onerror="this.style.display='none'">
      <span id="wbLabel">▶ Kijken</span>
    </a>
    <button id="shareBtn" class="share-btn" onclick="shareItem()" style="display:none">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/>
        <path d="m8.59 13.51 6.83 3.98M15.41 6.51l-6.82 3.98"/>
      </svg>
      Delen
    </button>
  </div>
</div>

<script src="script.js" defer></script>

</body>
</html>
