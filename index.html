<!DOCTYPE html>

<html lang="nl">
<head>
  <meta charset="UTF-8"/>
  <title>StreamGids</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="StreamGids"/>
  <meta name="theme-color" content="#050509"/>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 200'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%231a2240'/%3E%3Cstop offset='100%25' stop-color='%230d1525'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='200' height='200' rx='42' fill='url(%23g)'/%3E%3Crect x='136' y='24' width='32' height='32' rx='6' fill='%23E8001A'/%3E%3Ctext x='100' y='116' text-anchor='middle' dominant-baseline='middle' font-family='-apple-system' font-size='118' font-weight='800' fill='white' letter-spacing='-6'%3ESG%3C/text%3E%3C/svg%3E"/>
  <style>
:root{--bg:#050509;--card:#11111b;--accent:#0a84ff;--accent2:#32d74b;--t1:#f5f5f7;--t2:#a1a1b2;--t3:#6b6b7a;--s3:#232331;}
body[data-theme="light"]{--bg:#f0f0f5;--card:#fff;--accent:#0a84ff;--accent2:#28a745;--t1:#1c1c1e;--t2:#3a3a3c;--t3:#8e8e93;--s3:#e0e0ea;background:radial-gradient(circle at top,#d8d8f0 0,#f0f0f5 55%)!important;}
body[data-theme="light"] .day-section{background:linear-gradient(145deg,rgba(255,255,255,.97),rgba(240,240,248,.98));border-color:rgba(0,0,0,.06);box-shadow:0 8px 20px rgba(0,0,0,.08)}
body[data-theme="light"] .sheet{background:linear-gradient(160deg,#f8f8fc,#eeeef5);border-color:rgba(0,0,0,.08)}
body[data-theme="light"] #overlay{background:rgba(180,180,210,.8)}
body[data-theme="light"] .card{border-color:rgba(0,0,0,.08);box-shadow:0 4px 12px rgba(0,0,0,.1)}
body[data-theme="light"] .pill,body[data-theme="light"] .sc,body[data-theme="light"] .nav-btn{border-color:rgba(0,0,0,.1);background:rgba(0,0,0,.03);color:var(--t2)}
body[data-theme="light"] .pill.active,body[data-theme="light"] .sc.active{background:linear-gradient(135deg,rgba(10,132,255,.15),rgba(50,215,75,.06));border-color:rgba(10,132,255,.5);color:var(--accent)}
body[data-theme="light"] .panel-section{background:linear-gradient(145deg,rgba(255,255,255,.97),rgba(240,240,248,.98));border-color:rgba(0,0,0,.06);box-shadow:0 8px 20px rgba(0,0,0,.08)}
body[data-theme="light"] .panel-tab{border-color:rgba(0,0,0,.1);background:rgba(0,0,0,.03);color:var(--t2)}
body[data-theme="light"] .panel-tab.active{background:linear-gradient(135deg,rgba(10,132,255,.15),rgba(50,215,75,.06));border-color:rgba(10,132,255,.5);color:var(--accent)}
body[data-theme="light"] .sport-event{border-color:rgba(0,0,0,.06);background:rgba(0,0,0,.02)}
body[data-theme="light"] .sport-event:hover{background:rgba(0,0,0,.04)}
body[data-theme="light"] .news-item{border-color:rgba(0,0,0,.06);background:rgba(0,0,0,.02)}
body[data-theme="light"] .news-item:hover{background:rgba(0,0,0,.04)}
body[data-theme="light"] .top10-item:hover{background:rgba(0,0,0,.04)}
body[data-theme="light"] .top10-type-badge{background:rgba(0,0,0,.05);border-color:rgba(0,0,0,.1)}

*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,“SF Pro Text”,system-ui,sans-serif;background:#050509;color:var(–t1);-webkit-font-smoothing:antialiased;padding-bottom:env(safe-area-inset-bottom);overflow-x:hidden;}

/* Aurora */
.aurora{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;}
.aurora-blob{position:absolute;border-radius:50%;filter:blur(90px);opacity:.07;animation:auroraMove 20s ease-in-out infinite alternate;}
.aurora-blob:nth-child(1){width:600px;height:600px;background:#0a84ff;top:-200px;left:-150px;animation-duration:22s;}
.aurora-blob:nth-child(2){width:500px;height:500px;background:#5822B4;top:15%;right:-200px;animation-duration:28s;animation-delay:-9s;}
.aurora-blob:nth-child(3){width:400px;height:400px;background:#32d74b;bottom:5%;left:10%;animation-duration:24s;animation-delay:-5s;}
body[data-theme=“light”] .aurora-blob{opacity:.035}
@keyframes auroraMove{0%{transform:translate(0,0) scale(1);}33%{transform:translate(50px,35px) scale(1.06);}66%{transform:translate(-35px,55px) scale(.97);}100%{transform:translate(25px,-25px) scale(1.04);}}

.app{position:relative;z-index:1;min-height:100vh;max-width:900px;margin:0 auto;padding:env(safe-area-inset-top,24px) 16px 60px;padding-top:max(24px,env(safe-area-inset-top));}
header{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;}
.logo-wrap{display:flex;align-items:center;gap:10px;}
.logo-text{display:flex;align-items:baseline;line-height:1;}
.logo-stream{font-size:26px;font-weight:500;letter-spacing:-.5px;color:var(–t1);font-family:-apple-system,BlinkMacSystemFont,“SF Pro Display”,system-ui,sans-serif;}
.logo-gids{font-size:26px;font-weight:800;letter-spacing:-.5px;color:var(–t1);font-family:-apple-system,BlinkMacSystemFont,“SF Pro Display”,system-ui,sans-serif;}
.logo-nl{font-size:11px;font-weight:800;background:#E8001A;color:#fff;padding:2px 5px;border-radius:5px;margin-left:5px;align-self:center;}
.slogan{font-size:12px;color:var(–t3);margin:0 0 14px;letter-spacing:.01em;}
.theme-btn{display:flex;align-items:center;justify-content:center;padding:6px 14px;border-radius:999px;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.08);color:var(–t1);font-size:12px;font-weight:500;cursor:pointer;transition:all .16s ease;font-family:inherit;min-width:72px;}
.theme-btn:hover{border-color:rgba(10,132,255,.5);}
[data-theme=“light”] .theme-btn{border-color:rgba(0,0,0,.12);background:rgba(0,0,0,.04);color:var(–t2);}

/* Nav */
.pill-row{display:flex;gap:8px;margin-bottom:12px;flex-wrap:nowrap;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch;}
.pill-row::-webkit-scrollbar{display:none}
.pill{padding:6px 14px;border-radius:999px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.03);color:var(–t2);font-size:12px;font-weight:500;display:flex;align-items:center;gap:6px;white-space:nowrap;cursor:pointer;transition:all .18s ease;font-family:inherit;flex-shrink:0;}
.pill.active{border-color:rgba(10,132,255,.7);background:linear-gradient(135deg,rgba(10,132,255,.2),rgba(50,215,75,.08));color:var(–t1);box-shadow:0 0 0 1px rgba(10,132,255,.3);}
.svc-bar{display:flex;overflow-x:auto;gap:8px;padding:6px 2px 6px 0;margin-bottom:8px;-webkit-overflow-scrolling:touch;}
.svc-bar::-webkit-scrollbar{display:none}
.sc{flex:0 0 auto;display:flex;align-items:center;gap:6px;padding:6px 10px;border-radius:999px;background:rgba(15,15,24,.9);border:1px solid rgba(255,255,255,.06);color:var(–t2);font-size:11px;cursor:pointer;transition:all .16s ease;white-space:nowrap;font-family:inherit;}
.sc img{width:16px;height:16px;border-radius:4px;object-fit:cover;}
.sc .dot{width:10px;height:10px;border-radius:999px;flex-shrink:0;}
.sc.active{border-color:rgba(10,132,255,.75);background:linear-gradient(135deg,rgba(10,132,255,.25),rgba(50,215,75,.12));color:var(–t1);box-shadow:0 0 0 1px rgba(10,132,255,.4);}
.nav-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;gap:8px;}
.nav-btn{display:flex;align-items:center;gap:6px;padding:8px 14px;border-radius:999px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);color:var(–t2);font-size:12px;font-weight:500;cursor:pointer;transition:all .16s ease;white-space:nowrap;font-family:inherit;}
.nav-btn:hover:not(:disabled){border-color:rgba(10,132,255,.5);color:var(–t1);}
.nav-btn:disabled{opacity:.3;cursor:default;pointer-events:none;}
.nav-range{font-size:12px;color:var(–t3);text-align:center;flex:1;}

/* Tab transition */
.tab-view{animation:tabIn .26s cubic-bezier(.22,.68,0,1.15) both;}
@keyframes tabIn{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}

/* Loading */
.loading-screen,.error-screen{min-height:50vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;color:var(–t2);}
.spinner{width:22px;height:22px;border-radius:999px;border:2px solid rgba(255,255,255,.08);border-top-color:var(–accent);animation:spin .8s linear infinite;margin-bottom:14px;}
.loading-text{font-size:14px;}.loading-sub{font-size:12px;color:var(–t3);margin-top:6px;}
.error-icon{font-size:32px;margin-bottom:10px;}.error-title{font-weight:600;margin-bottom:4px;}
.error-msg{font-size:13px;color:var(–t3);max-width:260px;margin:0 auto 14px;}
.retry-btn{border:none;outline:none;padding:8px 16px;border-radius:999px;background:var(–accent);color:#fff;font-size:13px;font-weight:500;cursor:pointer;}

/* Skeletons */
.skeleton-track{display:flex;gap:10px;padding-bottom:4px;margin-bottom:6px;overflow:hidden;}
.skeleton-card{flex:0 0 142px;border-radius:16px;overflow:hidden;background:var(–card);border:1px solid rgba(255,255,255,.04);}
.skeleton-poster,.skeleton-line{background:linear-gradient(90deg,var(–s3) 25%,rgba(255,255,255,.06) 50%,var(–s3) 75%);background-size:200% 100%;animation:shimmer 1.6s ease-in-out infinite;}
.skeleton-poster{width:100%;aspect-ratio:2/3;}
.skeleton-line{height:10px;border-radius:4px;margin:8px 6px 4px;}
.skeleton-line.short{width:60%;margin-top:0;}
body[data-theme=“light”] .skeleton-poster,body[data-theme=“light”] .skeleton-line{background:linear-gradient(90deg,#e0e0ea 25%,rgba(0,0,0,.05) 50%,#e0e0ea 75%);background-size:200% 100%;}
@keyframes shimmer{0%{background-position:200% 0;}100%{background-position:-200% 0;}}

/* Day sections */
.day-section{margin-top:18px;padding:16px 12px 18px;border-radius:18px;background:linear-gradient(145deg,rgba(17,17,26,.96),rgba(8,8,14,.98));border:1px solid rgba(255,255,255,.04);box-shadow:0 16px 35px rgba(0,0,0,.75);opacity:0;transform:translateY(12px);transition:opacity .45s ease,transform .45s ease;}
.day-section.visible{opacity:1;transform:translateY(0);}
.day-section.today-section{border-color:rgba(10,132,255,.28);box-shadow:0 16px 35px rgba(0,0,0,.75),0 0 0 1px rgba(10,132,255,.18),inset 0 0 50px rgba(10,132,255,.07);}
.day-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:2px;}
.day-name{font-size:14px;font-weight:600;letter-spacing:.01em;}
.today-chip{font-size:11px;padding:3px 9px;border-radius:999px;background:#30af4c;color:#fff;font-weight:700;}
.day-sub{font-size:12px;color:var(–t3);margin-bottom:8px;}
.cat-row{font-size:12px;color:#fff;margin:10px 0 6px;}
.scroll-track{display:flex;gap:10px;overflow-x:auto;padding-bottom:4px;margin-bottom:6px;-webkit-overflow-scrolling:touch;}
.scroll-track::-webkit-scrollbar{height:0}

/* Cards */
.card{flex:0 0 142px;background:var(–card);border-radius:16px;border:1px solid rgba(255,255,255,.06);padding:6px 6px 10px;cursor:pointer;transition:transform .12s ease,box-shadow .12s ease,border-color .16s ease;box-shadow:0 10px 22px rgba(0,0,0,.7);transform-style:preserve-3d;will-change:transform;}
.card:active{transform:scale(.97)!important;}
.card-poster{position:relative;border-radius:12px;overflow:hidden;background:var(–s3);margin-bottom:6px;aspect-ratio:2/3;}
.card-poster img.poster{width:100%;height:100%;object-fit:cover;display:block;background:#000;}
.fallback{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;padding:8px;color:var(–t2);font-size:11px;text-align:center;}
.badge{position:absolute;bottom:6px;left:6px;font-size:10px;padding:2px 6px;border-radius:999px;display:inline-flex;align-items:center;max-width:calc(100% - 12px);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;backdrop-filter:blur(12px);}
.season-badge{position:absolute;top:6px;right:6px;font-size:10px;font-weight:700;padding:2px 6px;border-radius:999px;background:rgba(0,0,0,.72);color:#fff;backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.2);}
.card-title{font-size:12px;font-weight:500;line-height:1.2;margin-bottom:2px;max-height:2.4em;overflow:hidden;}
.card-meta{font-size:11px;color:var(–t3);}
.origin-badge{font-size:10px;padding:2px 6px;border-radius:6px;margin-left:6px;border:1px solid;}
.origin-badge.original{background:rgba(50,215,75,.2);color:#32d74b;border-color:rgba(50,215,75,.4);}
.origin-badge.licensed{background:rgba(255,193,7,.2);color:#f6c23e;border-color:rgba(255,193,7,.4);}
.divider{margin-top:10px;height:1px;background:linear-gradient(to right,rgba(255,255,255,.12),rgba(255,255,255,.02));}
.empty-day{font-size:13px;color:var(–t3);padding:8px 0;}

/* Sheet */
#overlay{position:fixed;inset:0;background:rgba(3,3,8,.88);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);display:none;align-items:flex-end;justify-content:center;z-index:20;}
#overlay.open{display:flex;}
.sheet{width:100%;max-width:640px;border-radius:22px 22px 0 0;background:linear-gradient(160deg,#101018,#06060d);padding:14px 16px calc(18px + env(safe-area-inset-bottom,0px));border:1px solid rgba(255,255,255,.08);border-bottom:none;box-shadow:0 -18px 40px rgba(0,0,0,.95);max-height:88vh;display:flex;flex-direction:column;animation:slideUp .28s ease-out;}
body[data-theme=“light”] .sheet{background:linear-gradient(160deg,#f8f8fc,#eeeef5);border-color:rgba(0,0,0,.08);}
.drag{width:36px;height:4px;border-radius:999px;background:rgba(255,255,255,.2);margin:0 auto 8px;}
body[data-theme=“light”] .drag{background:rgba(0,0,0,.15);}
.sheet-header{display:flex;gap:12px;margin-bottom:10px;}
.sp{width:84px;height:126px;border-radius:14px;overflow:hidden;background:var(–s3);flex-shrink:0;}
.sp img{width:100%;height:100%;object-fit:cover;}
.sinf{flex:1;min-width:0;}
.ssvc{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(–t2);margin-bottom:3px;}
.stitle{font-size:16px;font-weight:600;margin-bottom:2px;}
.smeta{font-size:12px;color:var(–t3);margin-bottom:4px;}
.stags{font-size:11px;margin-bottom:4px;}
.stag{display:inline-block;padding:2px 7px;border-radius:999px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.14);margin-right:4px;margin-bottom:3px;}
.sheet-body{font-size:13px;color:var(–t2);line-height:1.6;overflow:auto;padding-right:2px;margin-bottom:8px;}
.ratings-row{display:flex;gap:8px;margin-top:6px;flex-wrap:wrap;}
.rating-chip{display:inline-flex;align-items:center;gap:5px;padding:5px 10px;border-radius:999px;font-size:12px;font-weight:600;text-decoration:none;cursor:pointer;transition:opacity .15s ease;border:1px solid;}
.rating-chip:hover{opacity:.8;}
.rating-chip.imdb{background:rgba(245,197,24,.12);border-color:rgba(245,197,24,.4);color:#f5c518;}
.rating-chip.rt{background:rgba(250,50,50,.12);border-color:rgba(250,50,50,.4);color:#fa6060;}
.rating-chip.tmdb-score{background:rgba(10,132,255,.12);border-color:rgba(10,132,255,.35);color:var(–accent);}
.rating-chip .chip-logo{font-size:11px;font-weight:800;letter-spacing:-.5px;}
[data-theme=“light”] .rating-chip.imdb{background:rgba(245,197,24,.1);}
[data-theme=“light”] .rating-chip.rt{background:rgba(250,50,50,.1);}
[data-theme=“light”] .rating-chip.tmdb-score{background:rgba(10,132,255,.08);}
.watch-btn{width:100%;display:flex;align-items:center;justify-content:center;gap:6px;padding:9px 14px;border-radius:999px;border:none;outline:none;background:linear-gradient(135deg,#0a84ff,#32d74b);color:#fff;font-size:14px;font-weight:600;text-decoration:none;margin-top:14px;cursor:pointer;}
.share-btn{display:flex;align-items:center;justify-content:center;gap:6px;padding:9px 14px;border-radius:999px;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.06);color:var(–t1);font-size:13px;font-weight:500;cursor:pointer;margin-top:8px;width:100%;font-family:inherit;transition:all .16s ease;}
.share-btn:hover{background:rgba(255,255,255,.1);}
[data-theme=“light”] .share-btn{border-color:rgba(0,0,0,.12);background:rgba(0,0,0,.04);color:var(–t1);}

/* Panel (shared section style) */
.panel-section{margin-top:18px;padding:16px 12px 18px;border-radius:18px;background:linear-gradient(145deg,rgba(17,17,26,.96),rgba(8,8,14,.98));border:1px solid rgba(255,255,255,.04);box-shadow:0 16px 35px rgba(0,0,0,.75);}
.panel-title{font-size:15px;font-weight:700;letter-spacing:.01em;margin-bottom:4px;}
.panel-sub{font-size:12px;color:var(–t3);margin-bottom:12px;}
.panel-tabs{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;}
.panel-tab{padding:5px 12px;border-radius:999px;font-size:11px;font-weight:500;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);color:var(–t2);cursor:pointer;font-family:inherit;transition:all .15s ease;}
.panel-tab.active{border-color:rgba(10,132,255,.7);background:linear-gradient(135deg,rgba(10,132,255,.2),rgba(50,215,75,.08));color:var(–t1);}
.panel-updated{font-size:11px;color:var(–t3);text-align:right;margin-top:10px;}
.panel-loading{font-size:13px;color:var(–t3);padding:20px 0;text-align:center;}
.panel-empty{font-size:13px;color:var(–t3);padding:20px 0;text-align:center;}
.panel-disclaimer{font-size:11px;color:var(–t3);margin-top:10px;line-height:1.5;padding:8px;border-radius:8px;background:rgba(255,255,255,.03);}

/* Top 10 */
.top10-list{display:flex;flex-direction:column;gap:8px;}
.top10-item{display:flex;align-items:center;gap:12px;padding:8px 6px;border-radius:12px;cursor:pointer;transition:background .16s ease;}
.top10-item:hover{background:rgba(255,255,255,.04);}
.top10-rank{font-size:22px;font-weight:900;min-width:32px;text-align:center;line-height:1;color:var(–t3);font-style:italic;}
.top10-rank.rank-1{color:var(–t1);font-size:26px;}.top10-rank.rank-2{color:var(–t2);font-size:24px;}.top10-rank.rank-3{color:var(–t2);font-size:23px;}
.top10-poster{width:48px;height:72px;border-radius:8px;overflow:hidden;background:var(–s3);flex-shrink:0;}
.top10-poster img{width:100%;height:100%;object-fit:cover;display:block;}
.top10-info{flex:1;min-width:0;}
.top10-name{font-size:13px;font-weight:600;line-height:1.25;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.top10-meta{font-size:11px;color:var(–t3);}
.top10-score{font-size:12px;font-weight:600;color:#FFD60A;white-space:nowrap;flex-shrink:0;}
.top10-type-badge{font-size:10px;padding:2px 6px;border-radius:6px;margin-left:6px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);color:var(–t3);}

/* Live Sport */
.sport-tab.active{border-color:rgba(255,59,48,.6)!important;background:rgba(255,59,48,.15)!important;color:#ff6b6b!important;}
body[data-theme=“light”] .sport-tab.active{background:rgba(255,59,48,.08)!important;border-color:rgba(255,59,48,.4)!important;color:#cc2200!important;}
.live-dot{width:8px;height:8px;border-radius:999px;background:#ff3b30;box-shadow:0 0 0 3px rgba(255,59,48,.25);animation:livepulse 1.6s ease-in-out infinite;flex-shrink:0;margin-right:2px;}
@keyframes livepulse{0%,100%{box-shadow:0 0 0 3px rgba(255,59,48,.25);}50%{box-shadow:0 0 0 7px rgba(255,59,48,.06);}}
.sport-list{display:flex;flex-direction:column;gap:10px;}
.sport-event{display:flex;align-items:center;gap:12px;padding:10px 8px;border-radius:14px;border:1px solid rgba(255,255,255,.05);background:rgba(255,255,255,.02);transition:background .16s ease,transform .12s ease;}
.sport-event:hover{background:rgba(255,255,255,.05);}
.sport-event.is-live{border-color:rgba(255,59,48,.3);background:rgba(255,59,48,.06);}
.sport-icon{width:42px;height:42px;border-radius:10px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:22px;background:rgba(255,255,255,.05);}
.sport-info{flex:1;min-width:0;}
.sport-title{font-size:13px;font-weight:600;line-height:1.25;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

<script>
/* ── Config ── */
const WM_KEY='eLLuTN9mYhAAWBNl1P3XOGgRKFA1toAVWhOiYX3m';
const WM_BASE='https://api.watchmode.com/v1';
const TMDB_TOKEN='eyJhbGciOiJIUzI1NiJ9.eyJhdWQiOiJiZWI4MDVlODg2MmYyODhkOTQ1NDhmOTU1NGYyZjc2YiIsIm5iZiI6MTY3OTQ3MzE2Ni43NzMsInN1YiI6IjY0MWFiYTBlZjlhYTQ3MDBiMTUxZGRmYSIsInNjb3BlcyI6WyJhcGlfcmVhZCJdLCJ2ZXJzaW9uIjoxfQ.E73D999tD0DBX0aJVVfyooRa3T750C-Y_Hk1TZLr-EM';
const TMDB_BASE='https://api.themoviedb.org/3';
const TMDB_IMG='https://image.tmdb.org/t/p/w300';
const OMDB_KEY='';

/* ── Providers ── */
const WANTED_PROVIDERS=[
  {match:'netflix',key:'netflix',name:'Netflix',color:'#E50914',text:'#fff'},
  {match:'prime video',key:'prime video',name:'Prime Video',color:'#00A8E0',text:'#fff'},
  {match:'amazon prime',key:'prime video',name:'Prime Video',color:'#00A8E0',text:'#fff'},
  {match:'disney plus',key:'disney+',name:'Disney+',color:'#113CCF',text:'#fff'},
  {match:'disney+',key:'disney+',name:'Disney+',color:'#113CCF',text:'#fff'},
  {match:'apple tv plus',key:'apple tv+',name:'Apple TV+',color:'#555555',text:'#fff'},
  {match:'apple tv+',key:'apple tv+',name:'Apple TV+',color:'#555555',text:'#fff'},
  {match:'apple tv',key:'apple tv+',name:'Apple TV+',color:'#555555',text:'#fff'},
  {match:'max ',key:'max',name:'Max',color:'#5822B4',text:'#fff'},
  {match:'hbo max',key:'max',name:'Max',color:'#5822B4',text:'#fff'},
  {match:'skyshowtime',key:'skyshowtime',name:'SkyShowtime',color:'#003E7E',text:'#fff'},
  {match:'videoland',key:'videoland',name:'Videoland',color:'#CC0000',text:'#fff'},
  {match:'path',key:'pathe',name:'Pathé Thuis',color:'#FF6B00',text:'#fff'},
  {match:'npo',key:'npo',name:'NPO Start',color:'#FF6600',text:'#fff'},
  {match:'paramount',key:'paramount',name:'Paramount+',color:'#0064FF',text:'#fff'},
  {match:'discovery',key:'discovery',name:'Discovery+',color:'#0036A0',text:'#fff'},
  {match:'viaplay',key:'viaplay',name:'Viaplay',color:'#1F1646',text:'#fff'},
  {match:'canal',key:'canal',name:'Canal+',color:'#000000',text:'#fff'},
  {match:'mubi',key:'mubi',name:'MUBI',color:'#00B4B4',text:'#fff'},
  {match:'cinemember',key:'cinemember',name:'CineMember',color:'#E8003D',text:'#fff'},
  {match:'film1',key:'film1',name:'Film1',color:'#D10000',text:'#fff'},
];
const POPULAR_KEYS=['netflix','prime video','max','disney+','videoland','apple tv+','skyshowtime','viaplay','pathe','npo','paramount','discovery','mubi','cinemember','film1','canal'];
let TMDB_NL_PROVIDERS={};

/* ── Helpers ── */
function matchProvider(n){const l=(n||'').toLowerCase().replace(/[^a-z0-9\s]/g,'').trim();return WANTED_PROVIDERS.find(p=>l.includes(p.match));}
function getSvcStyle(n=''){const p=matchProvider(n);return p?{color:p.color,text:p.text}:{color:'#444',text:'#fff'};}
function providerKey(n){const p=matchProvider(n);return p?p.key:(n||'').toLowerCase().replace(/netherlands/gi,'').replace(/\s+/g,' ').trim();}
function isNLStreaming(n){return!!matchProvider(n);}
function detectOrigin(n){return['netflix','disney','max','hbo','videoland','apple','npo'].some(s=>(n||'').toLowerCase().includes(s))?'original':'licensed';}
function resolveType(t){if(!t)return null;const s=String(t).toLowerCase();if(s==='movie')return'movie';if(s.startsWith('tv_')||s.includes('series')||s.includes('miniseries')||s.includes('special'))return'tv';return null;}

/* ── State ── */
let allItems=[],typeFilter='all',svcFilter='all';
const detailCache={},imgCache={};
const WINDOW_SIZE=7;
let allDays=[],windowStart=0,wmSources=[],wmSourceMap={},currentModalItem=null;

/* ── Theme ── */
function applyTheme(t){if(t==='light')document.body.dataset.theme='light';else delete document.body.dataset.theme;const btn=document.getElementById('toggleTheme');if(btn)btn.textContent=t==='light'?'Donker':'Licht';}
function toggleTheme(){const n=document.body.dataset.theme==='light'?'dark':'light';applyTheme(n);localStorage.setItem('streamgids_theme',n);}

/* ── Share ── */
async function shareItem(){if(!currentModalItem)return;const title=currentModalItem.title||'StreamGids';if(navigator.share){try{await navigator.share({title,text:`Bekijk "${title}" via StreamGids`,url:location.href});}catch{}}else window.open(`https://wa.me/?text=${encodeURIComponent(`Bekijk "${title}": `+location.href)},'_blank'`);}

/* ── Cache ── */
function scGet(k){try{const v=sessionStorage.getItem(k);return v?JSON.parse(v):null;}catch{return null;}}
function scSet(k,v){try{sessionStorage.setItem(k,JSON.stringify(v));}catch{}}

/* ── Dates ── */
function dateOffset(o){const d=new Date();d.setDate(d.getDate()+o);return d.toISOString().slice(0,10);}
function dateStr(o=0){return dateOffset(o).replace(/-/g,'');}
function isoDate(d){if(!d)return'';const s=String(d);if(s.includes('-'))return s.slice(0,10);return`${s.slice(0,4)}-${s.slice(4,6)}-${s.slice(6,8)}`;}
function todayISO(){return new Date().toISOString().slice(0,10);}
function dayName(iso){const n=new Date(iso+'T12:00:00').toLocaleDateString('nl-NL',{weekday:'long'});return n.charAt(0).toUpperCase()+n.slice(1);}
function fullDate(iso){return new Date(iso+'T12:00:00').toLocaleDateString('nl-NL',{day:'numeric',month:'long',year:'numeric'});}
function shortDate(iso){return new Date(iso+'T12:00:00').toLocaleDateString('nl-NL',{day:'numeric',month:'short'});}

/* ── API ── */
async function wm(path,params={}){
  const url=new URL(WM_BASE+path);url.searchParams.set('apiKey',WM_KEY);
  Object.entries(params).forEach(([k,v])=>url.searchParams.set(k,v));
  const ck='wm_'+url;const c=scGet(ck);if(c)return c;
  const r=await fetch(url.toString());if(!r.ok)throw new Error(`WM ${r.status}`);
  const d=await r.json();scSet(ck,d);return d;
}
async function tmdb(path,params={}){
  const url=new URL(TMDB_BASE+path);Object.entries(params).forEach(([k,v])=>url.searchParams.set(k,v));
  const ck='tmdb_'+url;const c=scGet(ck);if(c)return c;
  const r=await fetch(url.toString(),{headers:{'Authorization':`Bearer ${TMDB_TOKEN}`,'Content-Type':'application/json'}});
  if(!r.ok)throw new Error(`TMDB ${r.status}`);const d=await r.json();scSet(ck,d);return d;
}
async function translateToNL(text){
  if(!text||!text.trim())return'Geen beschrijving beschikbaar.';
  try{const r=await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text.slice(0,500))}&langpair=en|nl`);const d=await r.json();const t=d?.responseData?.translatedText;return(t&&t!==text&&!t.toLowerCase().includes('mymemory'))?t:text;}catch{return text;}
}
async function fetchOMDB(id){if(!OMDB_KEY||!id)return null;const ck='omdb_'+id;const c=scGet(ck);if(c)return c;try{const r=await fetch(`https://www.omdbapi.com/?apikey=${OMDB_KEY}&i=${id}`);if(!r.ok)return null;const d=await r.json();if(d.Response==='False')return null;scSet(ck,d);return d;}catch{return null;}}

/* ── WM ── */
async function fetchWMSources(){try{const data=await wm('/sources',{regions:'NL'});const all=Array.isArray(data)?data:[];all.filter(s=>s.regions?.includes('NL')).forEach(s=>{wmSourceMap[s.id]=s;});wmSources=all.filter(s=>s.type==='sub'&&s.regions?.includes('NL')).sort((a,b)=>(a.name||'').localeCompare(b.name||''));}catch(e){console.warn('WM sources:',e);wmSources=[];}}
async function fetchWMReleases(){
  const from=dateStr(-60),to=dateStr(30);
  const[mv,tv]=await Promise.all([wm('/releases',{regions:'NL',start_date:from,end_date:to,types:'movie',limit:500}),wm('/releases',{regions:'NL',start_date:from,end_date:to,types:'tv_series,tv_miniseries,tv_special,tv_movie',limit:500})]);
  function parse(res,fb){return(res?.releases||[]).map(item=>{const src=wmSourceMap[item.source_id]||{name:item.source_name||''};const svc=(src.name||'').replace(/Netherlands/gi,'').trim();if(!svc||(!isNLStreaming(svc)&&!src.regions?.includes('NL')))return null;const resolved=resolveType(item.type||item.title_type)||fb;return{...item,img:item.poster_url||null,_type:resolved,_date:isoDate(item.source_release_date),_src:{...src,name:svc||src.name},_style:getSvcStyle(svc),_key:providerKey(svc),_originType:detectOrigin(svc),_source:'watchmode',_season:item.season_number||null};}).filter(Boolean);}
  return[...parse(mv,'movie'),...parse(tv,'tv')];
}

/* ── TMDB providers & releases ── */
async function fetchTMDBProviders(){
  const[md,td]=await Promise.all([tmdb('/watch/providers/movie',{watch_region:'NL',language:'nl-NL'}),tmdb('/watch/providers/tv',{watch_region:'NL',language:'nl-NL'})]);
  const seen=new Set();[...(md.results||[]),...(td.results||[])].forEach(p=>{if(seen.has(p.provider_id))return;seen.add(p.provider_id);const m=matchProvider(p.provider_name);if(!m)return;TMDB_NL_PROVIDERS[p.provider_id]={name:m.name,color:m.color,text:m.text,logo:p.logo_path?`https://image.tmdb.org/t/p/original${p.logo_path}`:null,rawName:p.provider_name};});
}
async function tmdbPages(path,params,maxPages=3){
  const first=await tmdb(path,{...params,page:1}).catch(()=>({results:[],total_pages:0}));const all=[...(first.results||[])];const total=Math.min(first.total_pages||1,maxPages);
  if(total>1){const rest=await Promise.all(Array.from({length:total-1},(_,i)=>tmdb(path,{...params,page:i+2}).catch(()=>({results:[]}))));rest.forEach(r=>all.push(...(r.results||[])));}return all;
}
async function fetchTMDBReleases(){
  const items=[],pe=Object.entries(TMDB_NL_PROVIDERS);if(!pe.length)return[];
  function make(m,prov,id,type){const date=type==='movie'?(m.release_date||''):(m.first_air_date||'');if(!date||!m.id)return null;return{id:`tmdb-${m.id}-${id}`,title:m.title||m.name||m.original_title||m.original_name||'',img:m.poster_path?`${TMDB_IMG}${m.poster_path}`:null,_type:type,_date:date,_src:{name:prov.name,logo_100px:prov.logo},_style:{color:prov.color,text:prov.text},_key:providerKey(prov.name),_originType:detectOrigin(prov.name),_source:'tmdb',_providerId:Number(id),tmdb_id:m.id,user_rating:m.vote_average||0,overview:m.overview||''};}
  document.getElementById('loadSub').textContent='TMDB: actuele titels ophalen…';
  try{const[nm,oa]=await Promise.all([tmdbPages('/movie/now_playing',{language:'nl-NL',region:'NL'},5),tmdbPages('/tv/on_the_air',{language:'nl-NL'},5)]);const ci=[...nm.slice(0,50).map(m=>({...m,_isTV:false})),...oa.slice(0,50).map(t=>({...t,_isTV:true}))];const bs=10;for(let i=0;i<ci.length;i+=bs){await Promise.all(ci.slice(i,i+bs).map(async m=>{try{const pd=await tmdb(`/${m._isTV?'tv':'movie'}/${m.id}/watch/providers`);const flat=pd?.results?.NL?.flatrate||[];for(const p of flat){const prov=TMDB_NL_PROVIDERS[p.provider_id];if(!prov)continue;const it=make(m,prov,p.provider_id,m._isTV?'tv':'movie');if(it)items.push(it);}}catch{}}));}}catch(e){console.warn('TMDB now_playing:',e);}
  const BATCH=4;for(let i=0;i<pe.length;i+=BATCH){const batch=pe.slice(i,i+BATCH);document.getElementById('loadSub').textContent=`TMDB: ${batch.map(([,p])=>p.name).join(', ')}…`;await Promise.all(batch.map(async([id,prov])=>{const base={watch_region:'NL',with_watch_providers:id,with_watch_monetization_types:'flatrate',language:'nl-NL',sort_by:'popularity.desc'};const cutoff=dateOffset(-1095);const[movs,tvs]=await Promise.all([tmdbPages('/discover/movie',{...base,'primary_release_date.gte':cutoff},5).catch(()=>[]),tmdbPages('/discover/tv',{...base,'first_air_date.gte':cutoff},5).catch(()=>[])]);movs.forEach(m=>{const it=make(m,prov,id,'movie');if(it)items.push(it);});tvs.forEach(t=>{const it=make(t,prov,id,'tv');if(it)items.push(it);});})).catch(e=>console.warn('TMDB batch:',e));}
  return items;
}

/* ── Merge ── */
function mergeItems(wm,td){const result=[],seen=new Set();for(const item of wm){if(!item._date)continue;const k=`${(item.title||'').toLowerCase().trim()}|${item._key}`;if(seen.has(k))continue;seen.add(k);result.push(item);}const ts=new Set();for(const item of td){if(!item._date||!item.title)continue;const dk=`${item.tmdb_id}|${item._key}`;if(ts.has(dk))continue;ts.add(dk);const tk=`${(item.title||'').toLowerCase().trim()}|${item._key}`;if(seen.has(tk))continue;seen.add(tk);result.push(item);}return result;}

/* ── Service bar ── */
function buildSvcBar(){const bar=document.getElementById('svcBar');const pm=new Map();for(const item of allItems){const k=item._key||'';if(pm.has(k))continue;pm.set(k,{name:item._src?.name||k,style:item._style,logo:item._src?.logo_100px||null});}const entries=[...pm.entries()].sort((a,b)=>{const ra=POPULAR_KEYS.indexOf(String(a[0]).toLowerCase()),rb=POPULAR_KEYS.indexOf(String(b[0]).toLowerCase());if((ra===-1?999:ra)!==(rb===-1?999:rb))return(ra===-1?999:ra)-(rb===-1?999:rb);return a[1].name.localeCompare(b[1].name);});bar.innerHTML=`<button class="sc active" data-k="all" onclick="setSvc(this)">⭐ Alle streamers</button>`;entries.forEach(([key,info])=>{const logoEl=info.logo?`<img src="${info.logo}" alt="${info.name}" onerror="this.style.display='none'" loading="lazy">`:`<div class="dot" style="background:${info.style.color}"></div>`;bar.innerHTML+=`<button class="sc${svcFilter===key?' active':''}" data-k="${key}" onclick="setSvc(this)">${logoEl}${info.name}</button>`;});}

/* ── Filters & days ── */
function filteredItems(){return allItems.filter(i=>{if(typeFilter==='movie'&&i._type!=='movie')return false;if(typeFilter==='tv'&&i._type!=='tv')return false;if(svcFilter!=='all'&&i._key!==svcFilter)return false;return!!i._date;});}
function buildDayList(){const set=new Set();for(let i=-30;i<=30;i++){const d=new Date();d.setDate(d.getDate()+i);set.add(d.toISOString().slice(0,10));}filteredItems().forEach(i=>set.add(i._date));allDays=[...set].sort();const today=todayISO();let idx=allDays.indexOf(today);if(idx===-1)idx=allDays.findIndex(d=>d>=today);if(idx===-1)idx=Math.max(0,allDays.length-WINDOW_SIZE);windowStart=idx;}
function grouped(){const map={};filteredItems().forEach(i=>{if(!map[i._date])map[i._date]={movies:[],tv:[]};(i._type==='movie'?map[i._date].movies:map[i._date].tv).push(i);});return map;}
function shiftWindow(delta){windowStart=Math.max(0,Math.min(allDays.length-WINDOW_SIZE,windowStart+delta));renderAll();window.scrollTo({top:0,behavior:'smooth'});}
function updateNavBar(){const bar=document.getElementById('navBar');if(!allDays.length){bar.style.display='none';return;}bar.style.display='flex';const vis=allDays.slice(windowStart,windowStart+WINDOW_SIZE);document.getElementById('navRange').textContent=vis.length?`${shortDate(vis[0])} – ${shortDate(vis[vis.length-1])}`:'';document.getElementById('btnPrev').disabled=windowStart<=0;document.getElementById('btnNext').disabled=windowStart+WINDOW_SIZE>=allDays.length;}

/* ── Skeleton HTML ── */
function skelTrack(n){return`<div class="skeleton-track">${Array(Math.min(n,5)).fill(0).map(()=>`<div class="skeleton-card"><div class="skeleton-poster"></div><div class="skeleton-line"></div><div class="skeleton-line short"></div></div>`).join('')}</div>`;}

/* ── IntersectionObserver for scroll animation ── */
let observer;
function setupObserver(){if(observer)observer.disconnect();observer=new IntersectionObserver(entries=>{entries.forEach(e=>{if(e.isIntersecting){e.target.classList.add('visible');observer.unobserve(e.target);}});},{threshold:.05,rootMargin:'0px 0px -20px 0px'});}

/* ── Render releases ── */
function renderAll(){
  const main=document.getElementById('main');main.innerHTML='<div class="tab-view" id="rv"></div>';const view=document.getElementById('rv');
  const g=grouped(),today=todayISO();const vis=allDays.slice(windowStart,windowStart+WINDOW_SIZE);
  setupObserver();
  vis.forEach(iso=>{
    const data=g[iso];const movies=data?.movies||[],tv=data?.tv||[];
    const sec=document.createElement('section');sec.className='day-section';
    if(iso===today)sec.classList.add('today-section');
    const chip=iso===today?'<span class="today-chip">Vandaag</span>':'';
    let html=`<div class="day-header"><div class="day-name">${dayName(iso)}</div>${chip}</div><div class="day-sub">${fullDate(iso)}</div>`;
    if(!movies.length&&!tv.length){html+=`<div class="empty-day">Geen nieuwe releases op deze dag.</div>`;}
    else{

const TOP_LEAGUES=[
  {id:'4480',name:'Champions League',   country:'EU', icon:'⭐',streamer:'Viaplay',pop:0},
  {id:'4328',name:'Premier League',     country:'ENG',icon:'⚽',streamer:'Viaplay',pop:1},

async function fetchSportEvents(){
  if(sportCache)return sportCache;
  const events=[],now=new Date();
  await Promise.all(TOP_LEAGUES.map(async league=>{
    const ck=`sdb_${league.id}`;let data=scGet(ck);
    if(!data){try{const r=await fetch(`https://www.thesportsdb.com/api/v1/json/3/eventsnextleague.php?id=${league.id}`);if(r.ok){data=await r.json();scSet(ck,data);}}catch{}}
    if(!data?.events)return;
    (data.events||[]).forEach(ev=>{
      const ds=ev.dateEvent||'',ts=ev.strTime?ev.strTime.slice(0,5):'14:00';
      const evDate=ds?new Date(`${ds}T${ts}:00`):null;if(!evDate||evDate<new Date(now-2*86400000))return;
      events.push({id:`sdb-${ev.idEvent}`,title:ev.strEvent||(ev.strHomeTeam&&ev.strAwayTeam?`${ev.strHomeTeam} – ${ev.strAwayTeam}`:'Wedstrijd'),subtitle:`${league.name} · ${league.country}`,icon:league.icon,streamer:league.streamer,date:evDate,isLive:false,popularity:league.pop,venue:ev.strVenue||''});
    });
  }));
  /* F1 */
  try{const ck='f1_2025';let data=scGet(ck);if(!data){const r=await fetch('https://ergast.com/api/f1/2025.json');if(r.ok){data=await r.json();scSet(ck,data);}}(data?.MRData?.RaceTable?.Races||[]).forEach(race=>{const rd=new Date(`${race.date}T${race.time||'14:00:00'}`);if(rd<new Date(now-86400000))return;events.push({id:`f1-${race.round}`,title:race.raceName,subtitle:`Formule 1 · ${race.Circuit?.Location?.country||''}`,icon:'🏎️',streamer:'Viaplay',date:rd,isLive:false,popularity:0,venue:race.Circuit?.circuitName||''});});}catch{}
  /* Sort: by date then by popularity rank */
  events.sort((a,b)=>{const da=a.date.toISOString().slice(0,10),db=b.date.toISOString().slice(0,10);if(da!==db)return a.date-b.date;return a.popularity-b.popularity;});
  sportCache=events.slice(0,80);return sportCache;
}

function sportDateLabel(date){
  const now=new Date();const today=now.toISOString().slice(0,10);const ev=date.toISOString().slice(0,10);
  const diff=Math.round((date-now)/86400000);const time=date.toLocaleTimeString('nl-NL',{hour:'2-digit',minute:'2-digit'});
  if(ev===today)return`Vandaag ${time}`;if(diff===1)return`Morgen ${time}`;
  if(diff<7)return date.toLocaleDateString('nl-NL',{weekday:'long'})+' '+time;
  return date.toLocaleDateString('nl-NL',{day:'numeric',month:'short'})+' '+time;
}

  if(sportFilter==='month')evs=all.filter(e=>e.isLive||(e.date>=now&&e.date<=monthEnd));
  if(!evs.length){listEl.innerHTML=`<div class="panel-empty">Geen evenementen voor deze periode.</div>`;return;}
  listEl.innerHTML=evs.map(ev=>{const si=SPORT_STREAMERS[ev.streamer]||{color:'#fff',bg:'rgba(80,80,80,.85)'};const liveBadge=ev.isLive?`<div class="sport-live-badge">LIVE</div>`:`<div class="sport-time">${sportDateLabel(ev.date)}</div>`;return`<div class="sport-event${ev.isLive?' is-live':''}"><div class="sport-icon">${ev.icon||'🏆'}</div><div class="sport-info"><div class="sport-title">${ev.title}</div><div class="sport-meta">${ev.subtitle}${ev.venue?' · '+ev.venue:''}</div></div><div class="sport-right">${liveBadge}<div class="sport-streamer" style="background:${si.bg};color:${si.color}">${ev.streamer}</div></div></div>`;}).join('');
}
function setSportFilter(f){
  sportFilter=f;
  document.querySelectorAll('.sport-tab').forEach(t=>{t.classList.remove('active');if((f==='week'&&t.textContent.includes('week'))||(f==='month'&&t.textContent.includes('maand'))||(f==='all'&&t.textContent==='Alles'))t.classList.add('active');});
  if(sportCache)renderSportList(sportCache);
}

/* ── Nieuws ── */
const NEWS_SOURCES=[
  {name:"The Verge",    url:"https://www.theverge.com/rss/streaming/index.xml"},
  {name:"Variety",      url:"https://variety.com/feed/rss/"},
  {name:"Deadline",     url:"https://deadline.com/feed/"},
  {name:"What's on Netflix",url:"https://www.whats-on-netflix.com/feed/"},
  {name:"Moviemeter",   url:"https://www.moviemeter.nl/rss/nieuws"},
];
const RSS_PROXY='https://api.rss2json.com/v1/api.json?rss_url=';

async function fetchNewsSource(src){
  const ck=`news_${src.url}`;const c=scGet(ck);if(c)return c;
  try{const r=await fetch(`${RSS_PROXY}${encodeURIComponent(src.url)}&api_key=public&count=10`);if(!r.ok)return[];const d=await r.json();const items=(d.items||[]).map(i=>({title:i.title||'',link:i.link||'#',pubDate:i.pubDate||'',thumbnail:i.thumbnail||i.enclosure?.link||'',source:src.name}));scSet(ck,items);return items;}catch{return[];}
}

async function renderNieuws(){
  const main=document.getElementById('main');main.innerHTML='';
  const sec=document.createElement('section');sec.className='panel-section tab-view';
  const t=new Date().toLocaleTimeString('nl-NL',{hour:'2-digit',minute:'2-digit'});
  sec.innerHTML=`
    <div class="panel-title">Entertainment Nieuws</div>
    <div class="panel-sub">Laatste nieuws over streaming, films en series</div>
    <div class="panel-tabs">
      ${NEWS_SOURCES.map((s,i)=>`<button class="panel-tab news-tab${i===0?' active':''}" onclick="setNieuwsSource(${i})">${s.name}</button>`).join('')}
    </div>
    <div id="newsList" class="news-list"><div class="panel-loading"><div class="spinner" style="margin:0 auto 8px"></div>Nieuws laden…</div></div>
    <div class="panel-updated">Bijgewerkt om ${t}</div>
    <div class="panel-disclaimer">Nieuws via publieke RSS feeds. Klik op een artikel om het volledig te lezen op de oorspronkelijke website.</div>`;
  main.appendChild(sec);await loadNews(0);
}
async function loadNews(idx){
  const listEl=document.getElementById('newsList');if(!listEl)return;
  listEl.innerHTML=`<div class="panel-loading"><div class="spinner" style="margin:0 auto 8px"></div>Laden…</div>`;
  const src=NEWS_SOURCES[idx];if(!src)return;
  const items=await fetchNewsSource(src);
  if(!items.length){listEl.innerHTML='<div class="panel-empty">Geen nieuws beschikbaar.</div>';return;}
  listEl.innerHTML=items.map(item=>{
    const date=item.pubDate?new Date(item.pubDate).toLocaleDateString('nl-NL',{day:'numeric',month:'short',year:'numeric'}):'';
    const cleanTitle=(item.title||'').replace(/<[^>]*>/g,'').trim();
    return`<a class="news-item" href="${item.link}" target="_blank" rel="noopener noreferrer">
      <div class="news-thumb">${item.thumbnail?`<img src="${item.thumbnail}" alt="" loading="lazy" onerror="this.parentElement.style.display='none'">`:''}</div>
      <div class="news-info"><div class="news-source">${item.source}</div><div class="news-title">${cleanTitle}</div><div class="news-meta">${date}</div></div>
    </a>`;
  }).join('');
}
function setNieuwsSource(idx){document.querySelectorAll('.news-tab').forEach((t,i)=>t.classList.toggle('active',i===idx));loadNews(idx);}

/* ── Init ── */
(function(){const s=localStorage.getItem('streamgids_theme');const p=window.matchMedia('(prefers-color-scheme: light)').matches?'light':'dark';applyTheme(s||p);})();
document.addEventListener('keydown',e=>{if(e.key==='Escape'){const ov=document.getElementById('overlay');if(ov.classList.contains('open')){ov.classList.remove('open');document.body.style.overflow='';currentModalItem=null;}}});

async function init(){
  try{
    const loading=document.querySelector('.loading-text'),loadSub=document.getElementById('loadSub');
    loading.textContent='Streamingdiensten ophalen…';loadSub.textContent='Watchmode + TMDB Nederland';
    await Promise.all([fetchWMSources().catch(e=>console.warn('WM sources:',e)),fetchTMDBProviders().catch(e=>console.warn('TMDB providers:',e))]);
    loading.textContent='Releases laden…';loadSub.textContent=`${wmSources.length} diensten gevonden`;
    const[wmI,tmI]=await Promise.all([fetchWMReleases().catch(e=>{console.warn('WM:',e);return[];}),fetchTMDBReleases().catch(e=>{console.warn('TMDB:',e);return[];})]);
    loadSub.textContent='';allItems=mergeItems(wmI,tmI);
    if(!allItems.length)throw new Error('Geen releases gevonden voor Nederland.');
    buildSvcBar();buildDayList();renderAll();
  }catch(e){
    console.error(e);document.getElementById('main').innerHTML=`<div class="error-screen"><div class="error-icon">⚠️</div><div class="error-title">Kon releases niet laden</div><div class="error-msg">${e.message||'Controleer je internetverbinding.'}</div><button class="retry-btn" onclick="location.reload()">Opnieuw proberen</button></div>`;
  }
}
init();
</script>
